<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Carousel - Full Image (No Crop)</title>
    <link rel="stylesheet" href="../../../style.css">
    <style>
        /* Minimal styling to fix cropping issue */
        body {
            background: #f5f7fb;
            font-family: system-ui, 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 2rem;
        }

        .carousel-container {
            max-width: 1200px;
            width: 100%;
            text-align: center;
            background: transparent;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 2rem;
            color: #1e2a3e;
            font-weight: 500;
        }

        .row {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 1.2rem;
            flex-wrap: nowrap;
        }

        .image-wrapper {
            flex: 1;
            max-width: 1000px;
            background: #e9edf2;
            /* neutral background for letterboxing */
            border-radius: 24px;
            box-shadow: 0 12px 28px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            /* No fixed aspect ratio - height adapts to image */
        }

        .image-wrapper img {
            width: 100%;
            height: auto;
            /* maintain natural aspect ratio */
            object-fit: contain;
            /* show full image, no cropping */
            display: block;
            transition: opacity 0.2s ease;
        }

        button {
            background: #2c3e50;
            border: none;
            color: white;
            font-size: 1.8rem;
            font-weight: bold;
            width: 64px;
            height: 64px;
            border-radius: 999px;
            cursor: pointer;
            transition: 0.2s;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        button:hover {
            background: #1a2c3b;
            transform: scale(1.02);
        }

        button:active {
            transform: scale(0.96);
        }

        @media (max-width: 700px) {
            .row {
                gap: 0.8rem;
            }

            button {
                width: 48px;
                height: 48px;
                font-size: 1.4rem;
            }

            h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>

<body>
    <div class="carousel-container">
        <h1>Bachelor's Degree - tolo-e-aftab</h1>
        <div class="row">
            <button id="prevBtn" aria-label="Previous image">←</button>
            <div class="image-wrapper">
                <img id="carouselImage" src="../../images/Certificates/tolo-e-aftab/1.png" alt="Certificate image">
            </div>
            <button id="nextBtn" aria-label="Next image">→</button>
        </div>
    </div>

    <script>
        // Three images – edit paths if needed
        const images = [
            "../../images/Certificates/tolo-e-aftab/1.png",
            "../../images/Certificates/tolo-e-aftab/2.png",
            "../../images/Certificates/tolo-e-aftab/3.png"
        ];

        let currentIndex = 0;
        const imgElement = document.getElementById('carouselImage');
        const prevButton = document.getElementById('prevBtn');
        const nextButton = document.getElementById('nextBtn');

        function updateImage(index) {
            const safeIndex = (index + images.length) % images.length;
            const newSrc = images[safeIndex];

            // Smooth fade transition
            imgElement.style.opacity = '0.6';
            setTimeout(() => {
                imgElement.src = newSrc;
                imgElement.style.opacity = '1';
            }, 120);

            currentIndex = safeIndex;
        }

        function nextImage() {
            updateImage(currentIndex + 1);
        }

        function prevImage() {
            updateImage(currentIndex - 1);
        }

        nextButton.addEventListener('click', nextImage);
        prevButton.addEventListener('click', prevImage);

        // Keyboard arrows
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevImage();
            } else if (e.key === 'ArrowRight') {
                e.preventDefault();
                nextImage();
            }
        });

        // Preload all images for instant switching
        images.forEach(src => {
            const img = new Image();
            img.src = src;
        });
    </script>
</body>

</html>
